<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
    <title>Music from DRStutz</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <main id="main" class="app" aria-label="Music player">
      <header class="top-bar">
        <h1 class="top-bar__title">Music by DRStutz</h1>
      </header>

      <div class="browser">
        <div class="album-picker">
          <label class="album-picker__label" for="album-select">Album</label>
          <select
            class="album-select"
            id="album-select"
            aria-label="Choose album"
          ></select>
        </div>

        <!-- <div
          class="download-bar"
          role="group"
          aria-label="Download albums as ZIP"
        >
          <button type="button" class="btn-dl" id="btn-download-album">
            Download this album
          </button>
          <button
            type="button"
            class="btn-dl btn-dl--ghost"
            id="btn-download-all"
          >
            Download everything
          </button>
        </div> -->
        <p
          class="download-status visually-hidden"
          id="download-status"
          aria-live="polite"
        ></p>

        <div
          id="track-panel"
          class="track-panel"
          role="region"
          aria-label="Tracks"
        >
          <ol class="track-list" id="track-list"></ol>
        </div>
      </div>

      <footer
        class="player-dock"
        role="region"
        aria-label="Audio player"
        id="player-bar"
      >
        <img
          class="player-dock__art"
          id="player-art"
          src="assets/art/idle.svg"
          alt=""
          width="76"
          height="76"
          decoding="async"
        />
        <div class="player-dock__meta">
          <div class="player-dock__title" id="player-title">—</div>
          <div class="player-dock__album" id="player-album"></div>
        </div>
        <div class="player-dock__seek">
          <span class="player-time" id="time-current">0:00</span>
          <input
            type="range"
            class="seek"
            id="seek"
            min="0"
            max="1000"
            value="0"
            aria-label="Seek"
          />
          <span class="player-time" id="time-duration">0:00</span>
        </div>
        <div class="player-dock__controls">
          <button
            type="button"
            class="btn-icon"
            id="btn-prev"
            aria-label="Previous track"
          >
            <svg
              class="btn-icon__svg"
              viewBox="0 0 24 24"
              width="24"
              height="24"
              aria-hidden="true"
            >
              <path
                fill="currentColor"
                d="M6 6h2v12H6V6zm3.5 6L18 18V6L9.5 12z"
              />
            </svg>
          </button>
          <button
            type="button"
            class="btn-icon btn-icon--primary"
            id="btn-play"
            aria-label="Play"
          >
            <span class="play-icon" aria-hidden="true">
              <svg
                class="btn-icon__svg"
                viewBox="0 0 24 24"
                width="24"
                height="24"
              >
                <path fill="currentColor" d="M8 5v14l11-7L8 5z" />
              </svg>
            </span>
            <span class="pause-icon hidden" aria-hidden="true">
              <svg
                class="btn-icon__svg"
                viewBox="0 0 24 24"
                width="24"
                height="24"
              >
                <path fill="currentColor" d="M6 5h4v14H6V5zm8 0h4v14h-4V5z" />
              </svg>
            </span>
          </button>
          <button
            type="button"
            class="btn-icon"
            id="btn-next"
            aria-label="Next track"
          >
            <svg
              class="btn-icon__svg"
              viewBox="0 0 24 24"
              width="24"
              height="24"
              aria-hidden="true"
            >
              <path
                fill="currentColor"
                d="M6 18l9.5-6L6 6v12zm10 0V6h2v12h-2z"
              />
            </svg>
          </button>
        </div>
      </footer>
    </main>

    <audio id="audio" preload="metadata" playsinline></audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
